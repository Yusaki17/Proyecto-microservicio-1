  services:
    mysqldb:
      image: mysql:latest
      container_name: mysqldb
      ports:
        - "${MYSQL_PORT}:3306"
      volumes:
        - mysql_data:/var/lib/mysql
      restart: always
      environment:
        - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
        - MYSQL_DATABASE=${MYSQL_DATABASE}
        - MYSQL_USER=${MYSQL_USER}
        - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      networks:
        - microservices

    oracle:
      image: container-registry.oracle.com/database/express:21.3.0-xe
      container_name: oracle-db
      environment:
        - ORACLE_PWD=${ORACLE_PWD}
      ports:
        - "${ORACLE_PORT}:1521"
      volumes:
        - oracle_data:/opt/oracle/oradata
      restart: always
      networks:
        - microservices

    postgresql:
      container_name: postgresql_db
      image: postgres
      restart: always
      environment:
        - POSTGRES_USER=${POSTGRESQL_DB_USERNAME}
        - POSTGRES_PASSWORD=${POSTGRESQL_DB_PASSWORD}
        - POSTGRES_DB=${CART_DB_NAME}
        - PGDATA=/data/postgres
      volumes:
        - postgres:/data/postgres
      ports:
        - "${POSTGRESQL_DB_PORT}:5432"
      networks:
        - microservices

    config-server:
      build:
        context: .
        dockerfile: ./config-server/Dockerfile
      container_name: config-server
      ports:
        - "${CONFIG_SERVER_PORT}:8888"
      networks:
        - microservices
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://config-server:${CONFIG_SERVER_PORT}/actuator/health" ]
        interval: 20s
        timeout: 3s
        retries: 5
      restart: on-failure

    discovery-server:
      build:
        context: .
        dockerfile: ./discovery-server/Dockerfile
      container_name: discovery-server
      depends_on:
        config-server:
          condition: service_healthy
      ports:
        - "${EUREKA_SERVER_PORT}:8761"
      environment:
        - SPRING_CONFIG_IMPORT=configserver:http://config-server:${CONFIG_SERVER_PORT}
      networks:
        - microservices
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://discovery-server:${EUREKA_SERVER_PORT}/actuator/health" ]
        interval: 20s
        timeout: 3s
        retries: 5
      restart: on-failure

    customer-microservice:
      build:
        context: .
        dockerfile: ./microservices/customer-microservice/Dockerfile
      container_name: customer-microservice
      depends_on:
        config-server:
          condition: service_healthy
        discovery-server:
          condition: service_healthy
        mysqldb:
          condition: service_started
      ports:
        - "${CUSTOMER_MICROSERVICE_PORT}:8091"
      environment:
        - SPRING_CONFIG_IMPORT=configserver:http://config-server:${CONFIG_SERVER_PORT}
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:${EUREKA_SERVER_PORT}/eureka/
        - SPRING_DATASOURCE_URL=jdbc:mysql://mysqldb:${MYSQL_PORT}/${CUSTOMER_DB_NAME}?createDatabaseIfNotExist=true
        - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
        - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
        - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      networks:
        - microservices

    product-microservice:
      build:
        context: .
        dockerfile: ./microservices/product-microservice/Dockerfile
      container_name: product-microservice
      depends_on:
        config-server:
          condition: service_healthy
        discovery-server:
          condition: service_healthy
        oracle:
          condition: service_started
      ports:
        - "${PRODUCT_MICROSERVICE_PORT}:8092"
      environment:
        - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/${PRODUCT_DB_NAME}
        - SPRING_DATASOURCE_USERNAME=${ORACLE_USERNAME}
        - SPRING_DATASOURCE_PASSWORD=${ORACLE_PWD}
        - SPRING_DATASOURCE_DRIVER_CLASS_NAME=oracle.jdbc.OracleDriver
        - SPRING_CONFIG_IMPORT=configserver:http://config-server:${CONFIG_SERVER_PORT}
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:${EUREKA_SERVER_PORT}/eureka/
        - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.OracleDialect          # ← AGREGAR
        - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.OracleDialect
      networks:
        - microservices

    cart-microservice:
      build:
        context: .
        dockerfile: ./microservices/cart-microservice/Dockerfile
      container_name: cart-microservice
      depends_on:
        config-server:
          condition: service_healthy
        discovery-server:
          condition: service_healthy
        postgresql:
          condition: service_started
      ports:
        - "${CART_MICROSERVICE_PORT}:8093"
      environment:
        - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:${POSTGRESQL_DB_PORT}/${CART_DB_NAME}
        - SPRING_DATASOURCE_USERNAME=${POSTGRESQL_DB_USERNAME}
        - SPRING_DATASOURCE_PASSWORD=${POSTGRESQL_DB_PASSWORD}
        - SPRING_CONFIG_IMPORT=configserver:http://config-server:${CONFIG_SERVER_PORT}
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:${EUREKA_SERVER_PORT}/eureka/
      networks:
        - microservices

    api-gateway:
      build:
        context: .
        dockerfile: ./api-gateway/Dockerfile
      container_name: api-gateway
      depends_on:
        config-server:
          condition: service_healthy
        discovery-server:
          condition: service_healthy
      ports:
        - "${API_GATEWAY_PORT}:8222"
      environment:
        - SPRING_CONFIG_IMPORT=configserver:http://config-server:${CONFIG_SERVER_PORT}
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:${EUREKA_SERVER_PORT}/eureka/
      networks:
        - microservices

  volumes:
    mysql_data:
    oracle_data:
    postgres:

  networks:
    microservices:
      driver: bridge